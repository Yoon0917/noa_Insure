# back/application.yml
server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: create # 개발 환경용. Entity 변경 시 DB 스키마 자동 업데이트
    show-sql: true
    properties:
      hibernate:
        format_sql: true
